<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Balls</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    overflow: hidden;
    height: 100vh;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tag {
    display: inline-block;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    letter-spacing: 1px;
    width: fit-content;
  }
  #score {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    padding-left: 4px;
    font-variant-numeric: tabular-nums;
  }
  #hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    transition: opacity 1s;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="ui">
  <span class="tag">GRAVITY BALLS</span>
  <span id="score">0 balls</span>
</div>
<div id="hint">Click to spawn — hold to attract — right-click to repel</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

const balls = [];
const G = 0.15;
const FRICTION = 0.997;
const BOUNCE = 0.75;
let mouseDown = false;
let rightDown = false;
let mx = 0, my = 0;
let spawnCooldown = 0;

class Ball {
  constructor(x, y, r) {
    this.x = x;
    this.y = y;
    this.r = r;
    this.mass = r * r;
    this.vx = (Math.random() - 0.5) * 6;
    this.vy = (Math.random() - 0.5) * 6;
    this.hue = Math.random() * 360;
    this.life = 1;
    this.trail = [];
  }

  update() {
    // Gravity
    this.vy += G;

    // Mouse attraction/repulsion
    if (mouseDown || rightDown) {
      const dx = mx - this.x;
      const dy = my - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;
      const force = rightDown ? -800 : 500;
      const f = force / (dist * dist) * this.mass;
      this.vx += (dx / dist) * f / this.mass;
      this.vy += (dy / dist) * f / this.mass;
    }

    this.vx *= FRICTION;
    this.vy *= FRICTION;
    this.x += this.vx;
    this.y += this.vy;

    // Walls
    if (this.x - this.r < 0) { this.x = this.r; this.vx *= -BOUNCE; }
    if (this.x + this.r > W) { this.x = W - this.r; this.vx *= -BOUNCE; }
    if (this.y - this.r < 0) { this.y = this.r; this.vy *= -BOUNCE; }
    if (this.y + this.r > H) { this.y = H - this.r; this.vy *= -BOUNCE; }

    // Trail
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 12) this.trail.shift();
  }

  draw() {
    // Trail
    for (let i = 0; i < this.trail.length - 1; i++) {
      const t = this.trail[i];
      const alpha = (i / this.trail.length) * 0.25;
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.r * (i / this.trail.length) * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 70%, 55%, ${alpha})`;
      ctx.fill();
    }

    // Main ball
    const grad = ctx.createRadialGradient(
      this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.1,
      this.x, this.y, this.r
    );
    grad.addColorStop(0, `hsla(${this.hue}, 80%, 75%, 0.95)`);
    grad.addColorStop(0.6, `hsla(${this.hue}, 70%, 50%, 0.85)`);
    grad.addColorStop(1, `hsla(${this.hue}, 60%, 30%, 0.6)`);

    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Glow
    ctx.shadowColor = `hsla(${this.hue}, 80%, 60%, 0.4)`;
    ctx.shadowBlur = 20;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function collide(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const minDist = a.r + b.r;
  if (dist < minDist && dist > 0) {
    const nx = dx / dist;
    const ny = dy / dist;
    const overlap = minDist - dist;
    const totalMass = a.mass + b.mass;
    a.x -= nx * overlap * (b.mass / totalMass);
    a.y -= ny * overlap * (b.mass / totalMass);
    b.x += nx * overlap * (a.mass / totalMass);
    b.y += ny * overlap * (a.mass / totalMass);

    const dvx = a.vx - b.vx;
    const dvy = a.vy - b.vy;
    const dot = dvx * nx + dvy * ny;
    if (dot > 0) {
      const impulse = (2 * dot) / totalMass * BOUNCE;
      a.vx -= impulse * b.mass * nx;
      a.vy -= impulse * b.mass * ny;
      b.vx += impulse * a.mass * nx;
      b.vy += impulse * a.mass * ny;
    }

    // Color blend on collision
    a.hue = (a.hue + b.hue) / 2 + Math.random() * 5;
    b.hue = a.hue + Math.random() * 10;
  }
}

function spawnBall(x, y) {
  if (balls.length >= 150) return;
  const r = 8 + Math.random() * 18;
  balls.push(new Ball(x, y, r));
  document.getElementById('score').textContent = balls.length + ' ball' + (balls.length !== 1 ? 's' : '');
}

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) { rightDown = true; return; }
  mouseDown = true;
  spawnBall(e.clientX, e.clientY);
  document.getElementById('hint').style.opacity = '0';
});
canvas.addEventListener('mouseup', e => {
  if (e.button === 2) { rightDown = false; return; }
  mouseDown = false;
});
canvas.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mx = t.clientX; my = t.clientY;
  mouseDown = true;
  spawnBall(mx, my);
  document.getElementById('hint').style.opacity = '0';
});
canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mx = t.clientX; my = t.clientY;
});
canvas.addEventListener('touchend', () => { mouseDown = false; });

function animate() {
  ctx.fillStyle = 'rgba(17, 17, 17, 0.25)';
  ctx.fillRect(0, 0, W, H);

  // Continuous spawn while holding
  if (mouseDown) {
    spawnCooldown++;
    if (spawnCooldown % 8 === 0) spawnBall(mx + (Math.random()-0.5)*20, my + (Math.random()-0.5)*20);
  } else {
    spawnCooldown = 0;
  }

  // Ball-to-ball collisions
  for (let i = 0; i < balls.length; i++) {
    for (let j = i + 1; j < balls.length; j++) {
      collide(balls[i], balls[j]);
    }
  }

  for (const b of balls) {
    b.update();
    b.draw();
  }

  // Connection lines between nearby balls
  ctx.lineWidth = 0.5;
  for (let i = 0; i < balls.length; i++) {
    for (let j = i + 1; j < balls.length; j++) {
      const dx = balls[i].x - balls[j].x;
      const dy = balls[i].y - balls[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        const alpha = (1 - dist / 100) * 0.12;
        ctx.beginPath();
        ctx.moveTo(balls[i].x, balls[i].y);
        ctx.lineTo(balls[j].x, balls[j].y);
        ctx.strokeStyle = `hsla(${(balls[i].hue + balls[j].hue) / 2}, 60%, 50%, ${alpha})`;
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
